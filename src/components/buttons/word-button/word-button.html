<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../styles/css-reset-jc.css">
    <link rel="stylesheet" href="../../../styles/main.css">
    <link rel="stylesheet" href="word-button.css">
    <script type="module" src="word-button.js" defer></script>
    <title>Word Button</title>
</head>
<body style="padding: 100px; display: flex; gap: 35px">
    <button type="button" class="comp word-button btn">
        <span class="arrow">&gt;</span>
        <span class="action" id="action-name">
            button
        </span>
    </button>
    <button type="button" class="comp word-button btn alt">
        <span class="action" id="action-name">
            confirm
        </span>
        <span class="arrow">&lt;</span>
    </button>
</body>
</html>
