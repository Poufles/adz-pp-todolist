    <script>
        const body = document.body
        const overlay = document.querySelector('.overlay');
        const component = document.querySelector('article');
        const component_shadow = component.parentElement;
        const info_wrapper = component.querySelector('.info-wrapper')
        const cont_crud = info_wrapper.querySelector('#crud');
        const view = cont_crud.querySelector('#view');

        view.addEventListener('click', (e) => {
            e.stopPropagation();

            const childRect = component.getBoundingClientRect();
            const starting_style = `--starting-top: ${childRect.top}px; --starting-left: ${childRect.left}px`;
            overlay.classList.add('show');

            component_shadow.removeChild(component);
            overlay.appendChild(component);
            component.classList.add('view');
            component.setAttribute('style', starting_style);


        });

        overlay.addEventListener('click', () => {
            const parentRec = component_shadow.getBoundingClientRect();
            const childRect = component.getBoundingClientRect();
            const parent_pos = `--parent-top: ${parentRec.top}px; --parent-left: ${parentRec.left}px`;
            const starting_style = `--starting-top: ${childRect.top}px; --starting-left: ${childRect.left}px`;

            component.classList.remove('view');
            component.classList.add('return');
            component.setAttribute('style', starting_style + '; ' + parent_pos);
            overlay.classList.remove('show');
            overlay.removeChild(component);
            body.appendChild(component);
            setTimeout(() => {
                component.classList.remove('return');
                component_shadow.appendChild(component);
            }, 200);
        });
    </script>
